name: Continuous Delivery - Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write 

jobs:
  build-release-docker:
    name: Release y Docker Image
    runs-on: ubuntu-latest

    steps:

      - name: 1. Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

     
      - name: 2.1. Dar permiso de ejecución
        run: chmod +x mvnw

      - name: 2.2. Compilar, Ejecutar Tests y Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw clean verify sonar:sonar -Dsonar.projectKey=soyminero02-a11y_Grupo-6 -Dsonar.organization=soyminero02-a11y -Dsonar.host.url=https://sonarcloud.io/ -Dsonar.qualitygate.wait=true -Dsonar.branch.name=main
            
      - name: 3. Generar Artefacto (.jar)
        run: ./mvnw package -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_VICTORNARUZ }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 4. Construir y empujar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: victornaruz/mgcss-api:latest, victornaruz/mgcss-api:${{ github.ref_name }}

      - name: 5. Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}