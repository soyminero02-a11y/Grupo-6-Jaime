name: Continuous Delivery - Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write 

jobs:
  build-release-docker:
    name: Release y Docker Image
    runs-on: ubuntu-latest

    steps:
      # PASO 1: Hacer checkout
      - name: 1. Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2 y 3. Compilar y Generar Artefacto
        run: ./mvnw clean package -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_VICTORNARUZ }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 4. Construir y empujar imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
        
          tags: tuusuario/mgcss-api:latest, tuusuario/mgcss-api:${{ github.ref_name }}

      - name: 5. Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}